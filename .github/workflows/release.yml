name: Publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: UTC Time Converter ${{ github.ref_name }}
          body: |
            ## UTC Time Converter ${{ github.ref_name }}

            桌面图形界面工具，用于 UTC、本地时区、IANA 时区和 Unix 时间戳之间的转换。

            ### 下载

            - Windows: `utc-time-converter.exe`
            - Debian/Ubuntu: `utc-time-converter_1.1.0_all.deb`

            ### 说明

            Debian 包依赖 `python3`、`python3-tk` 和 `tzdata`。
          files: |
            release/windows/utc-time-converter.exe
            release/linux/utc-time-converter_1.1.0_all.deb
